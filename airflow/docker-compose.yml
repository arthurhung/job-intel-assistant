x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: airflow/Dockerfile
  image: job-intel-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-job-intel-local-dev-secret}
    _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
    _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    JOB_INTEL_RESUME_PATH: ${JOB_INTEL_RESUME_PATH:-/opt/airflow/data/resume.txt}
    JOB_INTEL_CRAWLER_SOURCE: ${JOB_INTEL_CRAWLER_SOURCE:-all}
    JOB_INTEL_CRAWLER_LIMIT_PER_SOURCE: ${JOB_INTEL_CRAWLER_LIMIT_PER_SOURCE:-25}
    JOB_INTEL_DB_PATH: ${JOB_INTEL_DB_PATH:-/opt/airflow/data/job_intel.sqlite3}
    JOB_INTEL_REPORT_PATH: ${JOB_INTEL_REPORT_PATH:-/opt/airflow/reports/match_report.md}
    JOB_INTEL_AIRFLOW_ARTIFACT_DIR: ${JOB_INTEL_AIRFLOW_ARTIFACT_DIR:-/opt/airflow/data/airflow}
    JOB_INTEL_ALLOWED_LOCATIONS: ${JOB_INTEL_ALLOWED_LOCATIONS:-taipei,台北,臺北,new taipei,新北,taoyuan,桃園,remote}
    JOB_INTEL_USE_LLM_ANALYSIS: ${JOB_INTEL_USE_LLM_ANALYSIS:-false}
    JOB_INTEL_USE_LLM_PLANNER: ${JOB_INTEL_USE_LLM_PLANNER:-false}
    JOB_INTEL_AGENT_TOOL_LOOP: ${JOB_INTEL_AGENT_TOOL_LOOP:-true}
    JOB_INTEL_AGENT_104_LIMIT: ${JOB_INTEL_AGENT_104_LIMIT:-25}
    JOB_INTEL_NOTIFY_NO_NEW_JOBS: ${JOB_INTEL_NOTIFY_NO_NEW_JOBS:-true}
    JOB_INTEL_NOTIFY_TELEGRAM: ${JOB_INTEL_NOTIFY_TELEGRAM:-false}
    JOB_INTEL_TELEGRAM_MIN_SCORE: ${JOB_INTEL_TELEGRAM_MIN_SCORE:-70}
    JOB_INTEL_TELEGRAM_LIMIT: ${JOB_INTEL_TELEGRAM_LIMIT:-5}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  volumes:
    - ./dags:/opt/airflow/dags
    - ../data:/opt/airflow/data
    - ../reports:/opt/airflow/reports
    - ./logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/data /opt/airflow/reports
        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/logs /opt/airflow/dags /opt/airflow/data /opt/airflow/reports
        /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    user: "0:0"

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-postgres-db-volume:
